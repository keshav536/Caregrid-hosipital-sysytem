<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new CareGrid Hospital Management System account.">
  <title>Sign Up - CareGrid HMS</title>
  <!-- Anti-FOUC -->
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Existing Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1e3a8a 50%, #0F172A 100%);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.1), transparent 70%);
      bottom: -150px;
      left: -150px;
      pointer-events: none;
    }
    .auth-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 40px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 1;
      animation: fade-up 0.5s ease-out;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .auth-logo i { font-size: 1.75rem; }
    .auth-heading {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 6px;
    }
    [data-theme="dark"] .auth-heading { color: var(--text-main); }
    .auth-subheading {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .input-icon-wrapper { position: relative; }
    .input-icon-wrapper .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .input-icon-wrapper .form-control {
      padding-left: 44px;
      padding-right: 44px;
    }
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0;
      transition: var(--transition);
    }
    .password-toggle:hover { color: var(--primary); }

    /* Password strength indicator */
    .password-strength {
      margin-top: 8px;
      display: none;
    }
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background-color: var(--card-border);
      margin-bottom: 4px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease, background-color 0.3s ease;
    }
    .strength-text {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .auth-alert {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      display: none;
    }
    .auth-alert.error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      display: flex;
    }
    .auth-alert.success {
      background-color: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success);
      display: flex;
    }
    .btn-auth {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-auth .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-auth.loading .btn-spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 24px;
      user-select: none;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .checkbox-label a {
      color: var(--primary);
      font-weight: 500;
    }
    .auth-footer-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .auth-footer-text a {
      color: var(--primary);
      font-weight: 600;
      margin-left: 4px;
    }
    .auth-footer-text a:hover { text-decoration: underline; }
    .auth-theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      transition: var(--transition);
      z-index: 100;
    }
    .auth-theme-toggle:hover {
      background-color: rgba(255,255,255,0.2);
      transform: rotate(15deg);
    }
  </style>
</head>
<body style="background: #0F172A; padding: 0; margin: 0;">

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="auth-theme-toggle" aria-label="Toggle Dark Mode">
    <i class="fas fa-moon"></i>
  </button>

  <div class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <i class="fas fa-hospital-alt"></i>
        <span>CareGrid</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">Create Account</h1>
      <p class="auth-subheading">Join the CareGrid clinical management network.</p>

      <!-- Alert Box -->
      <div id="auth-alert" class="auth-alert" role="alert">
        <i class="fas fa-exclamation-circle" id="alert-icon"></i>
        <span id="auth-alert-msg"></span>
      </div>

      <!-- Signup Form -->
      <form id="signup-form" novalidate>
        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input
              type="text"
              id="signup-name"
              class="form-control"
              placeholder="Dr. John Smith"
              autocomplete="name"
              required
            >
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="signup-email"
              class="form-control"
              placeholder="doctor@caregrid.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="signup-password"
              class="form-control"
              placeholder="Minimum 8 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="password-toggle" id="toggle-signup-pwd" aria-label="Toggle Password Visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <!-- Password Strength -->
          <div class="password-strength" id="pwd-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-text" id="strength-text">Password strength</span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="signup-confirm"
              class="form-control"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
            >
            <button type="button" class="password-toggle" id="toggle-confirm-pwd" aria-label="Toggle Confirm Password Visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Terms Checkbox -->
        <label class="checkbox-label" for="accept-terms">
          <input type="checkbox" id="accept-terms" required>
          I agree to the <a href="#" onclick="return false;">Terms & Conditions</a> and <a href="#" onclick="return false;">Privacy Policy</a>
        </label>

        <!-- Submit Button -->
        <button type="submit" id="signup-btn" class="btn btn-primary btn-auth">
          <div class="btn-spinner"></div>
          <span class="btn-label"><i class="fas fa-user-plus"></i> Create Account</span>
        </button>
      </form>

      <p class="auth-footer-text">
        Already have an account?
        <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <!-- Firebase Auth Module Script -->
  <script type="module">
    import { signUp, watchAuthState } from "./auth.js";

    // Redirect if already logged in
    watchAuthState((user) => {
      if (user) window.location.href = "dashboard.html";
    });

    // ── Theme Toggle ──────────────────────────────────────
    const themeToggle = document.getElementById("theme-toggle");
    const applyTheme = (theme) => {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      themeToggle.querySelector("i").className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
    };
    applyTheme(localStorage.getItem("theme") || "light");
    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    });

    // ── Password Toggles ──────────────────────────────────
    function setupToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener("click", function () {
        const input = document.getElementById(inputId);
        const icon = this.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.className = "fas fa-eye-slash";
        } else {
          input.type = "password";
          icon.className = "fas fa-eye";
        }
      });
    }
    setupToggle("toggle-signup-pwd", "signup-password");
    setupToggle("toggle-confirm-pwd", "signup-confirm");

    // ── Password Strength ─────────────────────────────────
    const pwdInput    = document.getElementById("signup-password");
    const strengthBar = document.getElementById("pwd-strength");
    const fillEl      = document.getElementById("strength-fill");
    const textEl      = document.getElementById("strength-text");

    pwdInput.addEventListener("input", () => {
      const val = pwdInput.value;
      if (!val) { strengthBar.style.display = "none"; return; }
      strengthBar.style.display = "block";

      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { label: "Very Weak",  color: "#ef4444", width: "20%" },
        { label: "Weak",       color: "#f97316", width: "40%" },
        { label: "Fair",       color: "#f59e0b", width: "60%" },
        { label: "Strong",     color: "#22c55e", width: "80%" },
        { label: "Very Strong",color: "#14b8a6", width: "100%" },
      ];
      const level = levels[Math.min(score, 4)];
      fillEl.style.width = level.width;
      fillEl.style.backgroundColor = level.color;
      textEl.textContent = `Strength: ${level.label}`;
    });

    // ── Alert Helpers ─────────────────────────────────────
    function showAlert(message, type = "error") {
      const box  = document.getElementById("auth-alert");
      const msg  = document.getElementById("auth-alert-msg");
      const icon = document.getElementById("alert-icon");
      box.className = `auth-alert ${type}`;
      msg.textContent = message;
      icon.className = type === "success"
        ? "fas fa-check-circle"
        : "fas fa-exclamation-circle";
      box.style.display = "flex";
      box.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function clearAlert() {
      const box = document.getElementById("auth-alert");
      box.style.display = "none";
      box.className = "auth-alert";
    }

    // ── Form Validation ───────────────────────────────────
    function validate(name, email, password, confirm, terms) {
      if (!name.trim()) { showAlert("Please enter your full name."); return false; }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) { showAlert("Please enter a valid email address."); return false; }
      if (password.length < 8) { showAlert("Password must be at least 8 characters long."); return false; }
      if (password !== confirm) { showAlert("Passwords do not match. Please re-enter."); return false; }
      if (!terms) { showAlert("You must accept the Terms & Conditions to continue."); return false; }
      return true;
    }

    // ── Form Submit ───────────────────────────────────────
    const form      = document.getElementById("signup-form");
    const signupBtn = document.getElementById("signup-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAlert();

      const name    = document.getElementById("signup-name").value;
      const email   = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirm = document.getElementById("signup-confirm").value;
      const terms   = document.getElementById("accept-terms").checked;

      if (!validate(name, email, password, confirm, terms)) return;

      // Loading state
      signupBtn.disabled = true;
      signupBtn.classList.add("loading");
      signupBtn.querySelector(".btn-label").innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Creating Account...";

      const result = await signUp(email, password, name);

      if (result.success) {
        showAlert("Account created successfully! Redirecting to login...", "success");
        form.reset();
        document.getElementById("pwd-strength").style.display = "none";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } else {
        showAlert(result.error);
        signupBtn.disabled = false;
        signupBtn.classList.remove("loading");
        signupBtn.querySelector(".btn-label").innerHTML = "<i class='fas fa-user-plus'></i> Create Account";
      }
    });
  </script>
</body>
</html>
