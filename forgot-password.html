<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your CareGrid Hospital Management System password.">
  <title>Forgot Password - CareGrid HMS</title>
  <!-- Anti-FOUC -->
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Existing Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1e3a8a 50%, #0F172A 100%);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.1), transparent 70%);
      bottom: -150px;
      left: -150px;
      pointer-events: none;
    }
    .auth-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 1;
      animation: fade-up 0.5s ease-out;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .auth-logo i { font-size: 1.75rem; }
    .auth-heading {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 6px;
    }
    [data-theme="dark"] .auth-heading { color: var(--text-main); }
    .auth-subheading {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .input-icon-wrapper { position: relative; }
    .input-icon-wrapper .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .input-icon-wrapper .form-control {
      padding-left: 44px;
      padding-right: 44px;
    }
    .auth-alert {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      display: none;
    }
    .auth-alert.error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      display: flex;
    }
    .auth-alert.success {
      background-color: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success);
      display: flex;
    }
    .btn-auth {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-auth .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-auth.loading .btn-spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .auth-footer-text a {
      color: var(--primary);
      font-weight: 600;
      margin-left: 4px;
    }
    .auth-footer-text a:hover { text-decoration: underline; }
    .auth-theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      transition: var(--transition);
      z-index: 100;
    }
    .auth-theme-toggle:hover {
      background-color: rgba(255,255,255,0.2);
      transform: rotate(15deg);
    }
  </style>
</head>
<body style="background: #0F172A; padding: 0; margin: 0;">

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="auth-theme-toggle" aria-label="Toggle Dark Mode">
    <i class="fas fa-moon"></i>
  </button>

  <div class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <i class="fas fa-hospital-alt"></i>
        <span>CareGrid</span>
      </div>

      <!-- Heading -->
      <h1 class="auth-heading">Reset Password</h1>
      <p class="auth-subheading">Enter your email address to receive a secure link to reset your password.</p>

      <!-- Alert Box -->
      <div id="auth-alert" class="auth-alert" role="alert">
        <i class="fas fa-exclamation-circle" id="alert-icon"></i>
        <span id="auth-alert-msg"></span>
      </div>

      <!-- Forgot Password Form -->
      <form id="forgot-form" novalidate>
        <!-- Email -->
        <div class="form-group" style="margin-bottom: 24px;">
          <label class="form-label" for="forgot-email">Email Address</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="forgot-email"
              class="form-control"
              placeholder="doctor@caregrid.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="forgot-btn" class="btn btn-primary btn-auth">
          <div class="btn-spinner"></div>
          <span class="btn-label"><i class="fas fa-paper-plane"></i> Send Reset Link</span>
        </button>
      </form>

      <p class="auth-footer-text">
        Remember your password?
        <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <!-- Firebase Auth Module Script -->
  <script type="module">
    import { resetPassword, watchAuthState } from "./auth.js";

    // Redirect if already logged in
    watchAuthState((user) => {
      if (user) window.location.href = "dashboard.html";
    });

    // ── Theme Toggle ──────────────────────────────────────
    const themeToggle = document.getElementById("theme-toggle");
    const applyTheme = (theme) => {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      themeToggle.querySelector("i").className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
    };
    applyTheme(localStorage.getItem("theme") || "light");
    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    });

    // ── Alert Helpers ─────────────────────────────────────
    function showAlert(message, type = "error") {
      const box  = document.getElementById("auth-alert");
      const msg  = document.getElementById("auth-alert-msg");
      const icon = document.getElementById("alert-icon");
      box.className = `auth-alert ${type}`;
      msg.textContent = message;
      icon.className = type === "success"
        ? "fas fa-check-circle"
        : "fas fa-exclamation-circle";
      box.style.display = "flex";
      box.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function clearAlert() {
      const box = document.getElementById("auth-alert");
      box.style.display = "none";
      box.className = "auth-alert";
    }

    // ── Form Validation ───────────────────────────────────
    function validate(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !email.trim()) {
        showAlert("Please enter your email address.");
        return false;
      }
      if (!emailRegex.test(email)) {
        showAlert("Please enter a valid email address.");
        return false;
      }
      return true;
    }

    // ── Form Submit ───────────────────────────────────────
    const form      = document.getElementById("forgot-form");
    const forgotBtn = document.getElementById("forgot-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAlert();

      const email = document.getElementById("forgot-email").value.trim();

      if (!validate(email)) return;

      // Loading state
      forgotBtn.disabled = true;
      forgotBtn.classList.add("loading");
      forgotBtn.querySelector(".btn-label").innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Sending...";

      const result = await resetPassword(email);

      if (result.success) {
        showAlert("Success! If an account exists for this email, we have sent a password reset link.", "success");
        form.reset();
        forgotBtn.disabled = false;
        forgotBtn.classList.remove("loading");
        forgotBtn.querySelector(".btn-label").innerHTML = "<i class='fas fa-paper-plane'></i> Send Reset Link";
      } else {
        showAlert(result.error);
        forgotBtn.disabled = false;
        forgotBtn.classList.remove("loading");
        forgotBtn.querySelector(".btn-label").innerHTML = "<i class='fas fa-paper-plane'></i> Send Reset Link";
      }
    });
  </script>
</body>
</html>
